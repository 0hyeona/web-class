<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산도구</title>
</head>
<body>
    <script>
        console.log(Math.ceil(5.33));
        console.log(Math.floor(5.99));
        console.log(Math.round(5.5));
        console.log(Math.round(5.5));
        console.log(Math.pow(2,10));
        console.log(Math.sqrt(100));
        console.log(Math.abs(-30));
        console.log(Math.max(3,5,2,1,100));
        console.log(Math.min(3,5,2,1,100));
        console.log(Math.floor(Math.random()*45+1));
        console.log(3.1415926535.toFixed(2));
    </script>
</body>
</html>
