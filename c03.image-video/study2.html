<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비디오 태그</title>
</head>
<body>
    <h1>비디오 태그</h1>
    <!-- controls과 autoplay 속성명과 속성값이 같은 경우 한 번만 작성 -->
    <!-- autoplay 공공장소일 수도 있기 때문에 muted 같이 써서 음소거 모드-->
    <!-- 배경처럼 영상을 쓰고 싶을 때 loop -->
    <!-- poster 속성 : 썸네일 지정 (autoplay랑 poster은 같이 사용하지 않음)-->
    <video src="./video/video.mp4" controls autoplay muted loop poster="./img/jeju.jpg"></video>
</body>
</html>
