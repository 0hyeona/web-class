<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex</title>
    <link rel="stylesheet" href="./css/study1.css">
</head>
<body>
    <!-- <h1>flex</h1>
    <p>Flex Container : 부모/자식이 있을 때 부모에게 설정해야 한다.</p> -->
    <div class="box">
        <!-- Flex의 자식 태그들 (section) : Flex Item -->
        <!--  
        메인축 : 왼쪽에서 오른쪽으로 나란히 배치 (방향을 바꿀 수 있음) -> 부모에서 지정
            [flex-start] : 시작점
            [center] : 중간
            [flex-end] : 끝점
        교차축 : 메인축을 기준으로 수직 방향으로 만들어짐 (방향 : 위에서 아래 방향/ 바뀔 수 없음)
            [flex-start] : 시작점
            [center] : 중간
            [flex-end] : 끝점
        -->
        <section class="a">section1</section>
        <section class="b">section2</section>
        <section class="c">section3</section>
    </div>
</body>
</html>
