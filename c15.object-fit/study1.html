<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>object-fit</title>
    <link rel="stylesheet" href="./css/study1.css">
</head>
<body>
    <h1>object-fit</h1>
    <p>이미지의 크기를 맞춘다.</p>

    <img src="./img/jeju.jpg" alt="제주" class="a">
    <img src="./img/jeju.jpg" alt="제주" class="b">
    
    <!-- 이미지, 비디오 영역 (멀티 미디어 태그)를 감싸는 태그를 사용 -->
    <!-- 하나의 figure에 하나의 이미지/비디오 태그만 들어가야 함 -->
    <figure>
        <img src="./img/jeju.jpg" alt="제주">
        <!-- <figcaption>제쮸</figcaption> -->
    </figure>
</body>
</html>
