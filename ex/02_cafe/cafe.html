<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페 예제2</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aboreto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <main>
        <div class="banner">
            <div class="heading1 point-type">welcome</div>
        </div>
        
        <!-- 콘텐츠를 감싸는 영역 -->
        <div class="wrap">
            <!-- 1. 왼쪽: 타이틀 & 설명글 -->
            <div class="con1">
                <h2 class="heading2">
                    Baked Fresh,<br>
                    Crafted with Love
                </h2>
                <p class="para">
                    Experience the art of baking – where every loaf tells a story of warmth, passion, and tradition.
                </p>
            </div>
            
            <!-- 2. 오른쪽: 이미지 & 캡션 -->
            <div class="figure">
                <figure class="inner-figure">
                    <img src="./img/coffee.jpg" alt="coffee image">
                    <figcaption>
                        at <span>pure garden</span>, we believe baking is more than just making bread – it’s about creating moments. Our bakers knead every dough by hand, letting flour dance in the air and filling the space with the aroma of fresh beginnings.
                    </figcaption>
                </figure>
            </div>
        </div>
    </main>
</body>
</html>
